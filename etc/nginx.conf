        error_page 404 /404.html;
        location = /404.html {
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
        }
	
    	location = /app-callback {
	        rewrite ^ /app-callback.html last;
    	}

    	location = /app-callback.html {
        	try_files $uri =404;
