# =============================================================================
# FIDO2 Nginx 站点配置
# =============================================================================
# 此文件由 cluster-deploy.sh 自动生成
# 占位符: {{DOMAIN}}, {{APP_PORT}}, {{PORTAL_PORT}}
# =============================================================================

# HTTP重定向到HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name fido2.{{DOMAIN}} portal.{{DOMAIN}};
    
    # Let's Encrypt验证
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    
    # 其他请求重定向到HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# FIDO2 API Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fido2.{{DOMAIN}};
    
    # SSL证书 (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/fido2.{{DOMAIN}}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fido2.{{DOMAIN}}/privkey.pem;
    
    # SSL配置
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    
    # 现代SSL配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    
    # HSTS
    add_header Strict-Transport-Security "max-age=63072000" always;
    
    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # 日志
    access_log /var/log/nginx/fido2.access.log;
    error_log /var/log/nginx/fido2.error.log;
    
    # 请求大小限制
    client_max_body_size 10M;
    
    # 代理到Node.js后端
    location / {
        proxy_pass http://fido2_backend;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 缓冲设置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }
    
    # 健康检查端点
    location /health {
        proxy_pass http://fido2_backend/health;
        access_log off;
    }
}

# FIDO2 Portal
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name portal.{{DOMAIN}};
    
    # SSL证书 (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/fido2.{{DOMAIN}}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fido2.{{DOMAIN}}/privkey.pem;
    
    # SSL配置（同上）
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    
    # 安全头
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # 日志
    access_log /var/log/nginx/portal.access.log;
    error_log /var/log/nginx/portal.error.log;
    
    # 请求大小限制
    client_max_body_size 10M;
    
    # 代理到Portal后端
    location / {
        proxy_pass http://portal_backend;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # 静态文件
    location /static/ {
        alias /opt/fido2-portal/public/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
