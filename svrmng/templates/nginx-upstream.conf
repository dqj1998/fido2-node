# FIDO2 Node.js Backend Upstream
# 此文件由 cluster-deploy.sh 自动生成
# 手动修改可能会被覆盖

upstream fido2_backend {
    # IP Hash确保同一客户端始终路由到同一后端
    ip_hash;
    
    # Node.js应用服务器列表
    # 由部署脚本根据cluster.yaml动态生成
    server 192.168.1.21:8060;
    server 192.168.1.22:8060;
    
    # 健康检查（需要nginx_upstream_check_module）
    # check interval=3000 rise=2 fall=3 timeout=1000 type=http;
    # check_http_send "GET /health HTTP/1.0\r\n\r\n";
    # check_http_expect_alive http_2xx http_3xx;
}

# FIDO2 Portal Backend (本地)
upstream portal_backend {
    server 127.0.0.1:8065;
}
